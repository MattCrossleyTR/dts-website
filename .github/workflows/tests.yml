name: Tests
on:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install -r requirements-dev.txt
      - name: Test
        run: |
          cd backend
          python -m pytest
